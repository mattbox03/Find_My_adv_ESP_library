name: Build and validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  esp32-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [esp32, esp32c3, esp32s3, esp32c6]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install platformio==6.1.19
      - run: pio run -d ci -e ${{ matrix.environment }}

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install platformio==6.1.19
      - run: pio pkg pack . --output FindMyAdv.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: FindMyAdv-package
          path: FindMyAdv.tar.gz
